<!doctype html>
<html lang="en">
<head>
<meta charset="utf-8" />
<meta name="viewport" content="width=device-width, initial-scale=1" />
<title>LEO Factory Station — interactive viewer</title>
<style>
  :root {
    color-scheme: dark;
    --bg: #07070d;
    --fg: #e7e9f0;
    --muted: #8a8fa3;
    --accent: #ffb648;
    --panel: rgba(14, 16, 26, 0.85);
    --border: rgba(255, 255, 255, 0.10);
  }
  html, body {
    margin: 0;
    height: 100%;
    background: var(--bg);
    color: var(--fg);
    font-family: -apple-system, BlinkMacSystemFont, "Inter", "Segoe UI",
                 Helvetica, Arial, sans-serif;
    overflow: hidden;
  }
  #canvas-host {
    position: fixed;
    inset: 0;
  }
  canvas { display: block; }

  /* ---- info panel (right side) — hidden until a part is clicked ---- */
  #info {
    position: fixed;
    top: 18px;
    right: 22px;
    z-index: 5;
    width: 340px;
    max-height: calc(100vh - 36px);
    overflow-y: auto;
    background: var(--panel);
    border: 1px solid var(--border);
    border-radius: 12px;
    backdrop-filter: blur(8px);
    -webkit-backdrop-filter: blur(8px);
    padding: 16px 18px 18px;
    box-shadow: 0 10px 40px rgba(0, 0, 0, 0.4);
    opacity: 0;
    transform: translateX(8px);
    pointer-events: none;
    transition: opacity 0.18s ease, transform 0.18s ease;
  }
  #info.visible {
    opacity: 1;
    transform: translateX(0);
    pointer-events: auto;
  }
  #info .swatch {
    display: inline-block;
    width: 12px;
    height: 12px;
    border-radius: 3px;
    margin-right: 8px;
    vertical-align: middle;
    border: 1px solid rgba(255, 255, 255, 0.2);
  }
  #info h2 {
    font-size: 15px;
    margin: 0 0 6px;
    font-weight: 600;
    line-height: 1.3;
    display: flex;
    align-items: center;
  }
  #info .muted-name {
    font-size: 11px;
    color: var(--muted);
    margin: 0 0 10px 20px;
    font-family: ui-monospace, "SF Mono", Menlo, monospace;
    letter-spacing: 0.02em;
  }
  #info p.desc {
    font-size: 13px;
    line-height: 1.55;
    margin: 0 0 12px;
    color: #d4d6df;
  }
  #info .stat {
    font-size: 11px;
    color: var(--muted);
    line-height: 1.5;
  }

  /* ---- loading overlay ---- */
  #loading {
    position: fixed;
    inset: 0;
    z-index: 99;
    display: flex;
    align-items: center;
    justify-content: center;
    background: var(--bg);
    color: var(--muted);
    font-size: 13px;
  }
  #loading.gone { display: none; }

</style>
</head>
<body>

<div id="canvas-host"></div>

<div id="info">
  <h2><span class="swatch" id="swatch"></span><span id="info-title"></span></h2>
  <p class="muted-name" id="info-name"></p>
  <p class="desc" id="info-desc"></p>
  <div class="stat" id="info-stat"></div>
</div>

<div id="loading"></div>

<!-- Embedded STL data, generated by leo_factory.py -->
<script src="viewer_data.js"></script>

<script type="importmap">
{
  "imports": {
    "three": "https://unpkg.com/three@0.160.0/build/three.module.js",
    "three/addons/": "https://unpkg.com/three@0.160.0/examples/jsm/"
  }
}
</script>

<script type="module">
import * as THREE from "three";
import { OrbitControls } from "three/addons/controls/OrbitControls.js";
import { STLLoader } from "three/addons/loaders/STLLoader.js";

// ----- Scene setup ---------------------------------------------------------
const host = document.getElementById("canvas-host");
const scene = new THREE.Scene();
scene.background = new THREE.Color(0x07070d);
scene.fog = new THREE.Fog(0x07070d, 400, 1500);

const camera = new THREE.PerspectiveCamera(
  40, window.innerWidth / window.innerHeight, 0.5, 4000,
);
camera.position.set(180, 120, 220);

const renderer = new THREE.WebGLRenderer({ antialias: true });
renderer.setPixelRatio(Math.min(window.devicePixelRatio, 2));
renderer.setSize(window.innerWidth, window.innerHeight);
renderer.outputColorSpace = THREE.SRGBColorSpace;
host.appendChild(renderer.domElement);

// ----- Lighting (lit from +Y, ambient fill) -------------------------------
scene.add(new THREE.AmbientLight(0xffffff, 0.55));
const sun = new THREE.DirectionalLight(0xfff1d6, 1.4);
sun.position.set(60, 200, 30);
scene.add(sun);
const fill = new THREE.DirectionalLight(0x6680aa, 0.5);
fill.position.set(-100, -50, -80);
scene.add(fill);

// Reference grid (faint) and axis helper for orientation
const grid = new THREE.GridHelper(400, 20, 0x222236, 0x141420);
grid.position.y = -80;
scene.add(grid);

// Sun marker — small yellow sphere far on +Y
const sunMarker = new THREE.Mesh(
  new THREE.SphereGeometry(4, 16, 12),
  new THREE.MeshBasicMaterial({ color: 0xffd66a }),
);
sunMarker.position.set(0, 260, 0);
scene.add(sunMarker);

// ----- Controls ------------------------------------------------------------
const controls = new OrbitControls(camera, renderer.domElement);
controls.enableDamping = true;
controls.dampingFactor = 0.07;
controls.target.set(0, 0, 0);
controls.minDistance = 12;
controls.maxDistance = 1200;
controls.update();

// ----- State ---------------------------------------------------------------
const partMeshes = [];     // { mesh, name, color, baseColor, description, opacity }
let selected = null;
let hovered = null;

const infoPanel = document.getElementById("info");
const infoTitle = document.getElementById("info-title");
const infoName  = document.getElementById("info-name");
const infoDesc  = document.getElementById("info-desc");
const infoStat  = document.getElementById("info-stat");
const swatch    = document.getElementById("swatch");

function prettyName(name) {
  return name.replace(/_/g, " ").replace(/\b\w/g, c => c.toUpperCase());
}

function selectPart(rec) {
  // Restore the previous selection
  if (selected && selected !== rec) {
    selected.mesh.material.emissive.setHex(0x000000);
    selected.mesh.material.emissiveIntensity = 0;
  }
  selected = rec;
  if (!rec) {
    infoPanel.classList.remove("visible");
    return;
  }
  rec.mesh.material.emissive.setHex(0xffb648);
  rec.mesh.material.emissiveIntensity = 0.55;

  infoTitle.textContent = prettyName(rec.name);
  infoName.textContent = rec.name;
  infoDesc.textContent = rec.description;
  const c = new THREE.Color(rec.baseColor[0], rec.baseColor[1], rec.baseColor[2]);
  swatch.style.background = `#${c.getHexString()}`;
  const bbox = new THREE.Box3().setFromObject(rec.mesh);
  const size = new THREE.Vector3();
  bbox.getSize(size);
  infoStat.textContent =
    `bounds: ${size.x.toFixed(1)} × ${size.y.toFixed(1)} × ${size.z.toFixed(1)} m`;

  infoPanel.classList.add("visible");
}

// ----- Raycasting ----------------------------------------------------------
const raycaster = new THREE.Raycaster();
const pointer = new THREE.Vector2();
let pointerDownPos = null;

renderer.domElement.addEventListener("pointerdown", (e) => {
  pointerDownPos = { x: e.clientX, y: e.clientY };
});
renderer.domElement.addEventListener("pointerup", (e) => {
  if (!pointerDownPos) return;
  const dx = e.clientX - pointerDownPos.x;
  const dy = e.clientY - pointerDownPos.y;
  pointerDownPos = null;
  // Treat as click only if we barely moved (otherwise it was a drag/orbit)
  if (Math.abs(dx) > 5 || Math.abs(dy) > 5) return;

  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = partMeshes.map(p => p.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  if (hits.length === 0) {
    selectPart(null);
    return;
  }
  const hit = hits[0].object;
  const rec = partMeshes.find(p => p.mesh === hit);
  if (rec) selectPart(rec);
});

renderer.domElement.addEventListener("pointermove", (e) => {
  pointer.x = (e.clientX / window.innerWidth) * 2 - 1;
  pointer.y = -(e.clientY / window.innerHeight) * 2 + 1;
  raycaster.setFromCamera(pointer, camera);
  const meshes = partMeshes.map(p => p.mesh);
  const hits = raycaster.intersectObjects(meshes, false);
  const hit = hits.length > 0 ? hits[0].object : null;
  const rec = hit ? partMeshes.find(p => p.mesh === hit) : null;

  if (hovered && hovered !== rec && hovered !== selected) {
    hovered.mesh.material.emissive.setHex(0x000000);
    hovered.mesh.material.emissiveIntensity = 0;
  }
  if (rec && rec !== selected) {
    rec.mesh.material.emissive.setHex(0xffb648);
    rec.mesh.material.emissiveIntensity = 0.18;
  }
  hovered = rec;
  renderer.domElement.style.cursor = rec ? "pointer" : "grab";
});

// ----- Resize --------------------------------------------------------------
window.addEventListener("resize", () => {
  camera.aspect = window.innerWidth / window.innerHeight;
  camera.updateProjectionMatrix();
  renderer.setSize(window.innerWidth, window.innerHeight);
});

// ----- Load embedded STL data ---------------------------------------------
const loader = new STLLoader();

function base64ToArrayBuffer(b64) {
  const bin = atob(b64);
  const len = bin.length;
  const buf = new ArrayBuffer(len);
  const view = new Uint8Array(buf);
  for (let i = 0; i < len; i++) view[i] = bin.charCodeAt(i);
  return buf;
}

function loadEmbedded(part) {
  const buf = base64ToArrayBuffer(part.stl_b64);
  const geom = loader.parse(buf);
  geom.computeVertexNormals();
  const mat = new THREE.MeshStandardMaterial({
    color: new THREE.Color(part.color[0], part.color[1], part.color[2]),
    metalness: 0.30,
    roughness: 0.55,
    flatShading: false,
    transparent: part.opacity < 1.0,
    opacity: part.opacity,
  });
  const mesh = new THREE.Mesh(geom, mat);
  mesh.name = part.name;
  scene.add(mesh);
  partMeshes.push({
    mesh,
    name: part.name,
    baseColor: part.color,
    description: part.description,
    opacity: part.opacity,
  });
}

async function init() {
  if (!window.STATION_DATA) return;
  const manifest = window.STATION_DATA;

  // Decode + parse each embedded STL
  manifest.parts.forEach(loadEmbedded);

  // After all loaded, center the camera target on the geometry
  const all = new THREE.Box3();
  partMeshes.forEach(p => all.expandByObject(p.mesh));
  const center = new THREE.Vector3();
  all.getCenter(center);
  controls.target.copy(center);
  controls.update();

  document.getElementById("loading").classList.add("gone");
}

init();

// ----- Render loop ---------------------------------------------------------
function animate() {
  requestAnimationFrame(animate);
  controls.update();
  renderer.render(scene, camera);
}
animate();
</script>

</body>
</html>
